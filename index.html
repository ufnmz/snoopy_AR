<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snoopy AR</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }

    #scanning-hint {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      font-family: -apple-system, sans-serif;
      font-size: 15px;
      font-weight: 500;
      padding: 10px 22px;
      border-radius: 24px;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
    }
  </style>
</head>
<body>

  <div id="scanning-hint">📷 Point at the Snoopy QR code</div>

  <a-scene
    mindar-image="imageTargetSrc: targets.mind; autoStart: true; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
  >
    <a-assets>
      <a-asset-item id="snoopy-model" src="source/My Snoopy Model.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <a-entity mindar-image-target="targetIndex: 0">
      <!-- Scale tuned for a ~10cm printed QR code; adjust scale if too big/small -->
      <a-gltf-model
        id="snoopy"
        src="#snoopy-model"
        position="0 0 0"
        rotation="0 0 0"
        scale="0.05 0.05 0.05"
        animation__float="property: position; from: 0 0.08 0; to: 0 0.16 0; dir: alternate; dur: 1600; loop: true; easing: easeInOutSine"
      ></a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    const hint = document.getElementById('scanning-hint');

    document.addEventListener('targetFound', () => {
      hint.textContent = '🐶 Snoopy found!';
      setTimeout(() => { hint.style.opacity = '0'; }, 2000);
    });

    document.addEventListener('targetLost', () => {
      hint.style.opacity = '1';
      hint.textContent = '📷 Point at the Snoopy QR code';
    });
  </script>
</body>
</html>
