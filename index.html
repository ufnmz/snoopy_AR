<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snoopy AR</title>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: -apple-system, sans-serif; background: #000; }

    #splash {
      position: fixed; inset: 0; z-index: 20;
      background: #0a0a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 20px;
    }
    #splash-emoji { font-size: 80px; animation: pulse 1.4s ease-in-out infinite; }
    #splash-title { color: #fff; font-size: 28px; font-weight: 700; }
    #splash-sub   { color: rgba(255,255,255,0.5); font-size: 15px; text-align: center; max-width: 280px; line-height: 1.6; }
    #start-btn {
      margin-top: 8px;
      padding: 14px 40px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff; border: none; border-radius: 32px;
      font-size: 17px; font-weight: 700; cursor: pointer;
      box-shadow: 0 4px 24px rgba(102,126,234,0.5);
    }
    #start-btn:active { opacity: 0.8; }

    #hint-overlay {
      position: fixed; bottom: 40px; left: 0; right: 0;
      display: flex; justify-content: center;
      pointer-events: none; z-index: 10;
      opacity: 0; transition: opacity 0.5s;
    }
    #hint-overlay.visible { opacity: 1; }
    #hint-pill {
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.9);
      padding: 12px 24px;
      border-radius: 32px;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
    }

    #found-badge {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
      background: rgba(0,200,100,0.85);
      color: #fff; font-size: 14px; font-weight: 700;
      padding: 8px 22px; border-radius: 20px;
      z-index: 10; opacity: 0; transition: opacity 0.4s;
      pointer-events: none;
    }
    #found-badge.visible { opacity: 1; }

    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
  </style>
</head>
<body>

  <!-- Splash screen -->
  <div id="splash">
    <div id="splash-emoji">🐾</div>
    <div id="splash-title">Snoopy AR</div>
    <div id="splash-sub">Point your camera at the Snoopy QR code to bring him to life!</div>
    <button id="start-btn">Start AR Experience</button>
  </div>

  <!-- Scanning hint -->
  <div id="hint-overlay">
    <div id="hint-pill">📷 Point at the Snoopy QR code</div>
  </div>

  <!-- Found badge -->
  <div id="found-badge">🐶 Snoopy found!</div>

  <!-- MindAR + A-Frame scene -->
  <a-scene
    id="ar-scene"
    mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: no; uiError: no; uiScanning: no;"
    color-space="sRGB"
    renderer="colorManagement: true; physicallyCorrectLights: true;"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    style="display:none"
  >
    <a-assets>
      <a-asset-item id="snoopy-model" src="source/My Snoopy Model.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- Anchor on target index 0 (the QR code) -->
    <a-entity mindar-image-target="targetIndex: 0">
      <!-- Snoopy floats just above the QR code, scaled to fit -->
      <a-gltf-model
        id="snoopy"
        src="#snoopy-model"
        position="0 0.1 0"
        rotation="-90 0 0"
        scale="0.001 0.001 0.001"
        animation="property: position; from: 0 0.12 0; to: 0 0.18 0; dir: alternate; dur: 1800; loop: true; easing: easeInOutSine"
      ></a-gltf-model>
    </a-entity>
  </a-scene>

  <script>
    const splash     = document.getElementById('splash');
    const startBtn   = document.getElementById('start-btn');
    const arScene    = document.getElementById('ar-scene');
    const hintOverlay= document.getElementById('hint-overlay');
    const foundBadge = document.getElementById('found-badge');

    startBtn.addEventListener('click', () => {
      splash.style.display = 'none';
      arScene.style.display = 'block';
      hintOverlay.classList.add('visible');

      // Start MindAR after scene is visible
      arScene.addEventListener('loaded', () => {
        const sceneEl = arScene;
        sceneEl.systems['mindar-image-system'].start();
      }, { once: true });
    });

    // Target found / lost events
    document.addEventListener('targetFound', () => {
      hintOverlay.classList.remove('visible');
      foundBadge.classList.add('visible');

      // Scale-in animation on first find
      const snoopy = document.getElementById('snoopy');
      snoopy.setAttribute('animation__scale',
        'property: scale; from: 0.0001 0.0001 0.0001; to: 0.001 0.001 0.001; dur: 600; easing: easeOutElastic');
    });

    document.addEventListener('targetLost', () => {
      hintOverlay.classList.add('visible');
      foundBadge.classList.remove('visible');
    });
  </script>
</body>
</html>
