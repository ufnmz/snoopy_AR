<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snoopy AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0a0a1a; font-family: -apple-system, sans-serif; overflow: hidden; }

    #page {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 28px;
    }

    model-viewer {
      width: 80vw; height: 50vw;
      max-width: 400px; max-height: 300px;
      border-radius: 20px;
      background: transparent;
      --poster-color: transparent;
    }

    h1 { color: #fff; font-size: 26px; font-weight: 700; }

    #ar-btn {
      display: flex; align-items: center; gap: 10px;
      padding: 16px 40px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; border: none; border-radius: 40px;
      font-size: 18px; font-weight: 700; cursor: pointer;
    }
    #ar-btn svg { flex-shrink: 0; }

    #note { color: rgba(255,255,255,0.4); font-size: 13px; text-align: center; max-width: 260px; line-height: 1.6; }
  </style>
</head>
<body>
  <div id="page">
    <h1>Snoopy AR 🐾</h1>

    <model-viewer
      id="mv"
      src="source/snoopy.glb"
      ar
      ar-modes="quick-look scene-viewer webxr"
      camera-controls
      auto-rotate
      shadow-intensity="1"
      environment-image="neutral"
    ></model-viewer>

    <button id="ar-btn" onclick="document.getElementById('mv').activateAR()">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M1 6l5-4h12l5 4v12l-5 4H6l-5-4z"/>
        <circle cx="12" cy="12" r="3"/>
      </svg>
      View in AR
    </button>

    <p id="note">Tap "View in AR" to place Snoopy in your room using your camera.</p>
  </div>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</body>
</html>
