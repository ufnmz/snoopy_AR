<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Snoopy AR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600&display=swap" rel="stylesheet" />
  <style>
    @font-face {
      font-family: 'SnoopyFont';
      src: url('snoopy_reg-webfont.otf') format('opentype');
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      touch-action: none;
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }

    /* Camera feed — behind everything */
    #cam {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      background: #000;
    }

    /* Three.js canvas — transparent overlay */
    #canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      touch-action: none;
    }

    /* QR hint pill */
    #hint {
      position: fixed; bottom: 36px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55); backdrop-filter: blur(8px);
      color: #fff; font-family: -apple-system, sans-serif; font-size: 14px;
      padding: 10px 22px; border-radius: 24px;
      z-index: 5; pointer-events: none;
      transition: opacity 0.4s;
    }

    /* Splash screen */
    #splash {
      position: fixed; inset: 0; z-index: 10;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
    }

    #splash-content {
      display: flex; flex-direction: column;
      align-items: center; gap: 20px;
    }

    #splash h1 {
      font-family: 'SnoopyFont', cursive;
      font-size: 52px;
      color: #1a1a1a;
      line-height: 1;
    }
    #splash h1 em {
      font-style: normal;
      color: #E8382D;
    }

    #splash p {
      font-family: 'Nunito', sans-serif;
      font-size: 16px; font-weight: 600;
      color: #555;
      text-align: center;
      max-width: 240px; line-height: 1.6;
    }

    #start-btn {
      font-family: 'SnoopyFont', cursive;
      font-size: 22px;
      padding: 14px 52px;
      background: #1a1a1a;
      color: #fff;
      border: none; border-radius: 40px;
      cursor: pointer;
      box-shadow: 0 4px 0 #E8382D;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    #start-btn:active {
      transform: translateY(3px);
      box-shadow: 0 1px 0 #E8382D;
    }
  </style>
</head>
<body>

  <video id="cam" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="hint" style="display:none">Point at the QR code</div>

  <div id="splash">
    <div id="splash-content">
      <h1>Snoopy <em>AR</em></h1>
      <p>Point your camera at the QR code to see Snoopy.</p>
      <button id="start-btn">Start</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
  <script type="importmap">
  { "imports": {
    "three":          "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/":  "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }}
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    // ── Start button ───────────────────────────────────────────────
    document.getElementById('start-btn').addEventListener('click', async () => {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' } },
          audio: false
        });
        document.getElementById('cam').srcObject = stream;
      } catch {
        alert('Camera permission needed. Please allow and try again.');
        return;
      }
      document.getElementById('splash').style.display = 'none';
      document.getElementById('hint').style.display = 'block';
      initAR();
    });

    // ── AR Scene ───────────────────────────────────────────────────
    function initAR() {
      const canvas = document.getElementById('canvas');
      const video  = document.getElementById('cam');
      const hint   = document.getElementById('hint');

      // Renderer
      const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      renderer.setClearColor(0x000000, 0);
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.4;
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      // Scene & camera
      const scene = new THREE.Scene();
      const cam3  = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 1000);

      // Lighting
      scene.add(new THREE.AmbientLight(0xffffff, 2.5));
      const keyLight = new THREE.DirectionalLight(0xffffff, 3);
      keyLight.position.set(2, 4, 3);
      scene.add(keyLight);
      const fillLight = new THREE.DirectionalLight(0xffffff, 1.5);
      fillLight.position.set(-2, 1, -2);
      scene.add(fillLight);

      // Model container — positioned 1.5 m in front of camera
      const pivot = new THREE.Group();
      pivot.position.set(0, 0, -1.5);
      pivot.visible = false;
      scene.add(pivot);

      let mixer = null;
      let model = null;

      new GLTFLoader().load('snoopy.glb', (gltf) => {
        model = gltf.scene;

        // Auto-scale to ~0.5 m tall
        const box    = new THREE.Box3().setFromObject(model);
        const size   = box.getSize(new THREE.Vector3());
        const sc     = 0.5 / Math.max(size.x, size.y, size.z);
        const center = box.getCenter(new THREE.Vector3());
        model.scale.setScalar(sc);
        model.position.set(-center.x * sc, -center.y * sc, 0);
        pivot.add(model);

        mixer = new THREE.AnimationMixer(model);
        gltf.animations.forEach(clip => mixer.clipAction(clip).play());
      });

      // ── QR detection (every 200 ms) ──────────────────────────────
      const qrCanvas = document.createElement('canvas');
      const qrCtx   = qrCanvas.getContext('2d', { willReadFrequently: true });
      let qrVisible  = false;
      let lastSeen   = 0;

      setInterval(() => {
        if (video.readyState < video.HAVE_ENOUGH_DATA) return;
        const W = Math.floor(video.videoWidth  / 2);
        const H = Math.floor(video.videoHeight / 2);
        if (!W || !H) return;
        qrCanvas.width = W; qrCanvas.height = H;
        qrCtx.drawImage(video, 0, 0, W, H);
        const found = jsQR(qrCtx.getImageData(0, 0, W, H).data, W, H);
        if (found) {
          lastSeen = Date.now();
          if (!qrVisible && model) {
            qrVisible = true;
            pivot.visible = true;
            hint.style.opacity = '0';
          }
        } else if (qrVisible && Date.now() - lastSeen > 800) {
          qrVisible = false;
          pivot.visible = false;
          hint.style.opacity = '1';
        }
      }, 200);

      // ── Touch: 1 finger = rotate, 2 fingers = pinch zoom ────────
      let rotX = 0, rotY = 0, scale = 1;
      let lastX = null, lastY = null, lastPinchDist = null;

      const pinchDist = e => Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );

      canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        if (e.touches.length === 1) {
          lastX = e.touches[0].clientX;
          lastY = e.touches[0].clientY;
          lastPinchDist = null;
        } else if (e.touches.length === 2) {
          lastPinchDist = pinchDist(e);
          lastX = null;
        }
      }, { passive: false });

      canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if (e.touches.length === 1 && lastX !== null) {
          rotY += (e.touches[0].clientX - lastX) * 0.012;
          rotX += (e.touches[0].clientY - lastY) * 0.012;
          lastX = e.touches[0].clientX;
          lastY = e.touches[0].clientY;
        } else if (e.touches.length === 2 && lastPinchDist !== null) {
          const dist = pinchDist(e);
          scale *= dist / lastPinchDist;
          scale  = Math.max(0.2, Math.min(4, scale));
          lastPinchDist = dist;
        }
      }, { passive: false });

      canvas.addEventListener('touchend', () => { lastX = null; lastY = null; }, { passive: true });

      let mouseDown = false;
      canvas.addEventListener('mousedown',  e => { mouseDown = true;  lastX = e.clientX; lastY = e.clientY; });
      window .addEventListener('mousemove', e => {
        if (!mouseDown) return;
        rotY += (e.clientX - lastX) * 0.012;
        rotX += (e.clientY - lastY) * 0.012;
        lastX = e.clientX; lastY = e.clientY;
      });
      window.addEventListener('mouseup', () => mouseDown = false);

      // ── Render loop ───────────────────────────────────────────────
      const clock = new THREE.Clock();
      let t = 0;

      renderer.setAnimationLoop(() => {
        const delta = clock.getDelta();
        t += delta;
        if (mixer) mixer.update(delta);
        pivot.rotation.x = rotX;
        pivot.rotation.y = rotY;
        pivot.scale.setScalar(scale);
        if (model) model.position.y = -0.3 + Math.sin(t * 1.5) * 0.04;
        renderer.render(scene, cam3);
      });

      window.addEventListener('resize', () => {
        renderer.setSize(innerWidth, innerHeight);
        cam3.aspect = innerWidth / innerHeight;
        cam3.updateProjectionMatrix();
      });
    }
  </script>

</body>
</html>
