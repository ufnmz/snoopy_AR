<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snoopy AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; overflow: hidden; font-family: -apple-system, sans-serif; }
    canvas { display: block; touch-action: none; }

    #ui {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; flex-direction: column; align-items: center;
      padding: 24px 24px 40px;
      pointer-events: none;
    }
    #mood {
      font-size: 48px;
      margin-bottom: 8px;
      transition: transform 0.3s cubic-bezier(.34,1.56,.64,1);
    }
    #mood.bounce { transform: scale(1.5); }
    #label {
      color: rgba(255,255,255,0.9);
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    #hint {
      color: rgba(255,255,255,0.45);
      font-size: 13px;
    }

    #ar-btn {
      position: fixed; top: 20px; right: 20px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.25);
      color: white;
      padding: 10px 18px;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(12px);
      pointer-events: all;
      display: flex; align-items: center; gap: 8px;
    }
    #ar-btn:active { opacity: 0.7; }

    model-viewer {
      position: absolute;
      width: 1px; height: 1px;
      opacity: 0; pointer-events: none;
    }

    #loading {
      position: fixed; inset: 0;
      background: #0a0a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 16px; z-index: 10;
    }
    #loading-emoji { font-size: 64px; animation: pulse 1.2s ease-in-out infinite; }
    #loading-text { color: rgba(255,255,255,0.5); font-size: 15px; }
    @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }

    .stars {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, #1a1a3e 0%, #0a0a1a 70%);
      pointer-events: none; z-index: -1;
    }
  </style>
</head>
<body>
  <div class="stars"></div>
  <div id="loading">
    <div id="loading-emoji">🐾</div>
    <div id="loading-text">Loading Snoopy…</div>
  </div>

  <canvas id="canvas"></canvas>

  <div id="ui">
    <div id="mood">😢</div>
    <div id="label">Sad Snoopy</div>
    <div id="hint">Tap to cheer him up</div>
  </div>

  <button id="ar-btn">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M1 6l5-4h12l5 4v12l-5 4H6l-5-4z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
    View in AR
  </button>

  <!-- Hidden model-viewer purely for AR launch -->
  <model-viewer
    id="mv"
    src="source/My Snoopy Model.glb"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    shadow-intensity="1"
  ></model-viewer>

  <script type="module">
    import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.164/build/three.module.js';
    import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.164/examples/jsm/loaders/GLTFLoader.js';
    import { OrbitControls } from 'https://cdn.jsdelivr.net/npm/three@0.164/examples/jsm/controls/OrbitControls.js';

    const canvas = document.getElementById('canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.2;

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 10000);
    camera.position.set(0, 0, 5);

    // Lighting
    const ambient = new THREE.AmbientLight(0xffffff, 0.6);
    scene.add(ambient);
    const key = new THREE.DirectionalLight(0xffffff, 1.5);
    key.position.set(5, 10, 7);
    key.castShadow = true;
    scene.add(key);
    const fill = new THREE.DirectionalLight(0x8ab4f8, 0.4);
    fill.position.set(-5, 2, -3);
    scene.add(fill);

    const controls = new OrbitControls(camera, canvas);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.minDistance = 1;
    controls.maxDistance = 2000;
    controls.autoRotate = true;
    controls.autoRotateSpeed = 1.5;

    // State
    let sad = null;   // first child group
    let happy = null; // second child group
    let isSad = true;
    let isAnimating = false;

    const loader = new GLTFLoader();
    loader.load('source/My Snoopy Model.glb', (gltf) => {
      const model = gltf.scene;

      // Two snoopys are the two direct children of the root
      const children = model.children;
      sad   = children[0];   // node_id23
      happy = children[1];   // node_id42

      happy.visible = false;

      scene.add(model);

      // Auto-fit camera to the sad snoopy's bounding box
      fitCamera(sad);

      document.getElementById('loading').style.display = 'none';
    },
    undefined,
    (err) => {
      document.getElementById('loading-text').textContent = 'Failed to load model';
      console.error(err);
    });

    function fitCamera(obj) {
      const box = new THREE.Box3().setFromObject(obj);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxDim = Math.max(size.x, size.y, size.z);
      const fov = camera.fov * (Math.PI / 180);
      let dist = (maxDim / 2) / Math.tan(fov / 2);
      dist *= 1.5;
      camera.position.set(center.x, center.y, center.z + dist);
      camera.near = dist / 100;
      camera.far  = dist * 100;
      camera.updateProjectionMatrix();
      controls.target.copy(center);
      controls.minDistance = dist * 0.3;
      controls.maxDistance = dist * 5;
      controls.update();
    }

    // Toggle interaction
    function toggleSnoopy() {
      if (!sad || !happy || isAnimating) return;
      isAnimating = true;

      const outgoing = isSad ? sad : happy;
      const incoming = isSad ? happy : sad;
      const moodEl   = document.getElementById('mood');
      const labelEl  = document.getElementById('label');
      const hintEl   = document.getElementById('hint');

      // Quick scale-out then swap
      let t = 0;
      const startScale = outgoing.scale.clone();
      const duration = 300;
      const start = performance.now();

      function shrink(now) {
        t = Math.min((now - start) / duration, 1);
        const s = 1 - t * t;
        outgoing.scale.set(s, s, s);
        if (t < 1) {
          requestAnimationFrame(shrink);
        } else {
          outgoing.visible = false;
          outgoing.scale.copy(startScale);

          incoming.scale.set(0.01, 0.01, 0.01);
          incoming.visible = true;

          fitCamera(incoming);

          isSad = !isSad;
          if (isSad) {
            moodEl.textContent = '😢';
            labelEl.textContent = 'Sad Snoopy';
            hintEl.textContent  = 'Tap to cheer him up';
          } else {
            moodEl.textContent = '😄';
            labelEl.textContent = 'Happy Snoopy!';
            hintEl.textContent  = 'Tap to make him sad again';
          }

          // Bounce emoji
          moodEl.classList.add('bounce');
          setTimeout(() => moodEl.classList.remove('bounce'), 400);

          // Scale-in
          const start2 = performance.now();
          function grow(now2) {
            const t2 = Math.min((now2 - start2) / duration, 1);
            const s2 = t2 < 0.5
              ? 4 * t2 * t2 * t2
              : 1 - Math.pow(-2 * t2 + 2, 3) / 2; // ease in-out cubic
            incoming.scale.set(s2, s2, s2);
            if (t2 < 1) {
              requestAnimationFrame(grow);
            } else {
              incoming.scale.set(1, 1, 1);
              isAnimating = false;
            }
          }
          requestAnimationFrame(grow);
        }
      }
      requestAnimationFrame(shrink);
    }

    canvas.addEventListener('click', toggleSnoopy);
    canvas.addEventListener('touchend', (e) => {
      // Only toggle if it wasn't a drag (OrbitControls drag detection)
      if (e.changedTouches[0]) toggleSnoopy();
    }, { passive: true });

    // AR button — trigger model-viewer's AR
    document.getElementById('ar-btn').addEventListener('click', () => {
      const mv = document.getElementById('mv');
      if (mv && mv.canActivateAR) {
        mv.activateAR();
      } else {
        alert('AR is not supported on this device/browser.\nTry opening on your phone!');
      }
    });

    // Resize
    window.addEventListener('resize', () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });

    // Render loop
    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();
  </script>

  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</body>
</html>
