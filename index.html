<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Snoopy AR</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }

    /* Camera feed sits behind everything */
    #cam {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1); /* mirror front cam; remove if rear cam */
    }

    /* Three.js canvas on top, transparent background */
    #canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
    }

    /* Splash */
    #splash {
      position: fixed; inset: 0; z-index: 10;
      background: #0a0a1a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 24px;
    }
    #splash h1 { color: #fff; font-size: 28px; font-weight: 700; font-family: -apple-system, sans-serif; }
    #splash p  { color: rgba(255,255,255,0.5); font-size: 15px; font-family: -apple-system, sans-serif; text-align: center; max-width: 260px; line-height: 1.6; }
    #start-btn {
      padding: 16px 48px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff; border: none; border-radius: 40px;
      font-size: 18px; font-weight: 700; cursor: pointer;
      font-family: -apple-system, sans-serif;
    }

    #hint {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      color: #fff; font-family: -apple-system, sans-serif; font-size: 14px;
      padding: 10px 22px; border-radius: 24px;
      z-index: 5; pointer-events: none;
      backdrop-filter: blur(8px);
    }
  </style>
</head>
<body>

  <video id="cam" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>
  <div id="hint" style="display:none">Tap to toggle happy / sad 🐾</div>

  <div id="splash">
    <h1>Snoopy AR 🐾</h1>
    <p>Snoopy will appear right in front of you through your camera.</p>
    <button id="start-btn">Start AR</button>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

    document.getElementById('start-btn').addEventListener('click', async () => {
      // Start rear camera
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } },
          audio: false
        });
        const video = document.getElementById('cam');
        video.srcObject = stream;
        // Rear cam — no mirror
        video.style.transform = 'none';
      } catch (e) {
        alert('Camera permission needed for AR. Please allow camera access and try again.');
        return;
      }

      document.getElementById('splash').style.display = 'none';
      document.getElementById('hint').style.display = 'block';
      initScene();
    });

    function initScene() {
      const canvas = document.getElementById('canvas');
      const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      renderer.setSize(innerWidth, innerHeight);
      renderer.setClearColor(0x000000, 0); // transparent so camera shows through
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.4;
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      const scene = new THREE.Scene();
      const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 0.01, 1000);
      camera.position.set(0, 0, 0);

      // Lighting to match real-world brightness
      scene.add(new THREE.AmbientLight(0xffffff, 2.5));
      const key = new THREE.DirectionalLight(0xffffff, 3);
      key.position.set(2, 4, 3);
      scene.add(key);
      const fill = new THREE.DirectionalLight(0xffffff, 1.5);
      fill.position.set(-2, 1, -2);
      scene.add(fill);

      const loader = new GLTFLoader();
      loader.load('snoopy.glb', (gltf) => {
        const model = gltf.scene;

        // Scale to ~0.5m tall, position 1.5m in front at chest height
        const box = new THREE.Box3().setFromObject(model);
        const size = box.getSize(new THREE.Vector3());
        const sc = 0.5 / Math.max(size.x, size.y, size.z);
        model.scale.setScalar(sc);
        const center = box.getCenter(new THREE.Vector3());
        model.position.set(-center.x * sc, -center.y * sc - 0.2, -1.5);

        scene.add(model);

        // Play animations if any
        const mixer = new THREE.AnimationMixer(model);
        gltf.animations.forEach(clip => mixer.clipAction(clip).play());

        // Floating bob
        let t = 0;
        const baseY = model.position.y;
        const clock = new THREE.Clock();

        renderer.setAnimationLoop(() => {
          const delta = clock.getDelta();
          mixer.update(delta);
          t += delta;
          model.position.y = baseY + Math.sin(t * 1.5) * 0.04;
          model.rotation.y = Math.sin(t * 0.4) * 0.2;
          renderer.render(scene, camera);
        });
      });

      window.addEventListener('resize', () => {
        renderer.setSize(innerWidth, innerHeight);
        camera.aspect = innerWidth / innerHeight;
        camera.updateProjectionMatrix();
      });
    }
  </script>
</body>
</html>
